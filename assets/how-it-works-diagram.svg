  <text x="1116" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#275B54">gpt-5.4-nano</text>
  <text x="1116" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#275B54">Merge overlapping findings</text>

