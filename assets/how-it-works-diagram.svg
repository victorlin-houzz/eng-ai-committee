  <text x="462" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#3B2B16">Structural pre-check</text>
  <text x="462" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4F4029">gpt-5.4-nano</text>
  <text x="462" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4F4029">Required sections verified</text>
  <text x="462" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4F4029">Missing sections -> immediate Reject</text>

  <rect x="620" y="142" width="360" height="518" rx="28" fill="#FFFDF8" stroke="#F0B659" stroke-width="3" filter="url(#shadow)"/>
  <rect x="620" y="142" width="360" height="58" rx="28" fill="#F7AE2A"/>
  <text x="800" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">Specialist Review Team</text>

  <rect x="652" y="224" width="296" height="108" rx="22" fill="#FFF7E6" stroke="#F0B659" stroke-width="2"/>
  <text x="800" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#3B2B16">Security + Compliance</text>
  <text x="800" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Auth, abuse cases, privacy, retention, audit</text>
  <text x="800" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Model: gpt-5.4 medium</text>

  <rect x="652" y="352" width="296" height="108" rx="22" fill="#FFF7E6" stroke="#F0B659" stroke-width="2"/>
  <text x="800" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#3B2B16">Architecture + Infra</text>
  <text x="800" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Scalability, data flow, resilience, cost, ops</text>
  <text x="800" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Model: gpt-5.4 medium</text>

  <rect x="652" y="480" width="296" height="108" rx="22" fill="#FFF7E6" stroke="#F0B659" stroke-width="2"/>
  <text x="800" y="512" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#3B2B16">Product + Ops</text>
  <text x="800" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Journeys, UX edges, rollout, SLOs, runbooks</text>
  <text x="800" y="564" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Model: gpt-5.4 medium</text>

  <text x="800" y="624" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6A5530">
    Parallel review over text plus extracted diagrams/images
  </text>

