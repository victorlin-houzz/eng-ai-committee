<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7E6"/>
      <stop offset="1" stop-color="#F7FAFF"/>
    </linearGradient>
    <linearGradient id="orangePanel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFE1B8"/>
      <stop offset="1" stop-color="#FFB84D"/>
    </linearGradient>
    <linearGradient id="tealPanel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#E5FFF7"/>
      <stop offset="1" stop-color="#8DE1CB"/>
    </linearGradient>
    <linearGradient id="violetPanel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#EEF0FF"/>
      <stop offset="1" stop-color="#B7C4FF"/>
    </linearGradient>
    <linearGradient id="greenVerdict" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D6FFE4"/>
      <stop offset="1" stop-color="#64D68B"/>
    </linearGradient>
    <linearGradient id="amberVerdict" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF2C9"/>
      <stop offset="1" stop-color="#F5B14A"/>
    </linearGradient>
    <linearGradient id="redVerdict" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFD7D4"/>
      <stop offset="1" stop-color="#FF7466"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#243B5320"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2L11 7L2 12" stroke="#56637A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="greenArrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2L11 7L2 12" stroke="#129B59" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="redArrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2L11 7L2 12" stroke="#DD564C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="820" rx="28" fill="url(#bg)"/>

  <text x="700" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1E2B3A">
    eng-ai-committee review pipeline
  </text>
  <text x="700" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5F6F82">
    Multimodal intake, parallel specialist review, skeptic debate, and deterministic verdict rules
  </text>

  <rect x="54" y="186" width="248" height="324" rx="26" fill="#FFFDF8" stroke="#F0B659" stroke-width="3" filter="url(#shadow)"/>
  <text x="178" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#3B2B16">Inputs</text>

  <rect x="78" y="256" width="200" height="106" rx="20" fill="#FFF2D8" stroke="#F0B659" stroke-width="2"/>
  <text x="178" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#3B2B16">Source docs</text>
  <text x="178" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Supports PDF, DOCX,</text>
  <text x="178" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Markdown, TXT, and images</text>

  <rect x="78" y="382" width="200" height="96" rx="20" fill="#FFF2D8" stroke="#F0B659" stroke-width="2"/>
  <text x="178" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#3B2B16">Evidence rule</text>
  <text x="178" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Every finding must cite</text>
  <text x="178" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">a document excerpt</text>

  <rect x="54" y="544" width="248" height="160" rx="26" fill="url(#orangePanel)" stroke="#E29A1D" stroke-width="3" filter="url(#shadow)"/>
  <text x="178" y="586" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#3B2B16">Structural pre-check</text>
  <text x="178" y="622" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4F4029">gpt-5.4-nano</text>
  <text x="178" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4F4029">Verify required sections</text>
  <text x="178" y="676" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4F4029">Missing sections trigger fast fail</text>

  <rect x="352" y="146" width="382" height="466" rx="28" fill="#FFFDF8" stroke="#F0B659" stroke-width="3" filter="url(#shadow)"/>
  <rect x="352" y="146" width="382" height="60" rx="28" fill="#F7AE2A"/>
  <text x="543" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">Specialist Review Team</text>

  <rect x="384" y="230" width="318" height="102" rx="22" fill="#FFF7E6" stroke="#F0B659" stroke-width="2"/>
  <text x="543" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#3B2B16">Security + Compliance</text>
  <text x="543" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Auth, abuse cases, privacy, retention, audit</text>
  <text x="543" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Model: gpt-5.4 medium</text>

  <rect x="384" y="354" width="318" height="102" rx="22" fill="#FFF7E6" stroke="#F0B659" stroke-width="2"/>
  <text x="543" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#3B2B16">Architecture + Infra</text>
  <text x="543" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Scalability, data flow, resilience, cost, ops</text>
  <text x="543" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Model: gpt-5.4 medium</text>

  <rect x="384" y="478" width="318" height="102" rx="22" fill="#FFF7E6" stroke="#F0B659" stroke-width="2"/>
  <text x="543" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#3B2B16">Product + Ops</text>
  <text x="543" y="538" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Journeys, UX edges, rollout, SLOs, runbooks</text>
  <text x="543" y="562" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Model: gpt-5.4 medium</text>

  <text x="543" y="644" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6A5530">
    Parallel review over extracted text plus diagrams/images
  </text>

  <rect x="772" y="180" width="188" height="134" rx="24" fill="url(#tealPanel)" stroke="#2CA98A" stroke-width="3" filter="url(#shadow)"/>
  <text x="866" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#18463E">Deduplication</text>
  <text x="866" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#275B54">gpt-5.4-nano</text>
  <text x="866" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#275B54">Merge overlapping findings</text>

  <rect x="754" y="356" width="224" height="274" rx="28" fill="url(#violetPanel)" stroke="#5F79E8" stroke-width="3" filter="url(#shadow)"/>
  <text x="866" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#243475">Skeptic Debate</text>
  <text x="866" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4052A4">gpt-5.4 medium</text>

  <rect x="786" y="460" width="160" height="48" rx="14" fill="#FFFFFF" stroke="#7D92F0" stroke-width="2"/>
  <text x="866" y="491" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#243475">Challenge</text>

  <rect x="786" y="520" width="160" height="48" rx="14" fill="#FFFFFF" stroke="#7D92F0" stroke-width="2"/>
  <text x="866" y="551" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#243475">Rebut in parallel</text>

  <rect x="786" y="580" width="160" height="48" rx="14" fill="#FFFFFF" stroke="#7D92F0" stroke-width="2"/>
  <text x="866" y="611" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#243475">Rate survive/drop</text>

  <rect x="1000" y="188" width="220" height="260" rx="26" fill="#FFFFFF" stroke="#5F79E8" stroke-width="3" filter="url(#shadow)"/>
  <text x="1110" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#243475">Judge</text>
  <text x="1110" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4052A4">gpt-5.4-pro</text>
  <text x="1110" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4052A4">high effort</text>
  <text x="1110" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4052A4">Uses the full</text>
  <text x="1110" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4052A4">debate trace</text>
  <text x="1110" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4052A4">and code-enforced</text>
  <text x="1110" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4052A4">verdict rules</text>

  <rect x="754" y="668" width="224" height="90" rx="20" fill="#FFFFFF" stroke="#5F79E8" stroke-width="2"/>
  <text x="866" y="702" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#243475">Confidence bands</text>
  <text x="866" y="728" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4052A4">85-100 clear pass or reject</text>
  <text x="866" y="748" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4052A4">25-44 uncertain goes to revise</text>

  <rect x="1035" y="502" width="150" height="72" rx="20" fill="url(#greenVerdict)" stroke="#2D9B5D" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1110" y="547" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#11442A">PASS</text>

  <rect x="1035" y="594" width="150" height="72" rx="20" fill="url(#amberVerdict)" stroke="#D18B22" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1110" y="639" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#5F3B08">REVISE</text>

  <rect x="1035" y="686" width="150" height="72" rx="20" fill="url(#redVerdict)" stroke="#DD564C" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1110" y="731" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#611B16">REJECT</text>

  <rect x="54" y="724" width="248" height="74" rx="22" fill="#FFFFFF" stroke="#DD564C" stroke-width="3" stroke-dasharray="8 10"/>
  <text x="178" y="753" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#8A2F2A">Fast fail path</text>
  <text x="178" y="778" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#8A2F2A">Missing sections send to Reject</text>

