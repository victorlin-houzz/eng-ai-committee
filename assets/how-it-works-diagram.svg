  <text x="1116" y="579" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#243475">Rebut in parallel</text>

  <rect x="1034" y="608" width="164" height="48" rx="14" fill="#FFFFFF" stroke="#7D92F0" stroke-width="2"/>
  <text x="1116" y="639" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#243475">Rate survive/drop</text>

  <rect x="1252" y="220" width="112" height="240" rx="26" fill="#FFFFFF" stroke="#5F79E8" stroke-width="3" filter="url(#shadow)"/>
  <text x="1308" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#243475">Judge</text>
  <text x="1308" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4052A4">gpt-5.4-pro</text>
  <text x="1308" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4052A4">high effort</text>
  <text x="1308" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4052A4">Uses full</text>
  <text x="1308" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4052A4">debate trace</text>
  <text x="1308" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4052A4">plus code-</text>
  <text x="1308" y="416" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4052A4">enforced rules</text>

  <rect x="1192" y="544" width="180" height="72" rx="20" fill="url(#greenVerdict)" stroke="#2D9B5D" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1282" y="589" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#11442A">PASS</text>

  <rect x="1192" y="628" width="180" height="72" rx="20" fill="url(#amberVerdict)" stroke="#D18B22" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1282" y="673" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#5F3B08">REVISE</text>

  <rect x="1192" y="712" width="180" height="72" rx="20" fill="url(#redVerdict)" stroke="#DD564C" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1282" y="757" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#611B16">REJECT</text>

