  <text x="1116" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4052A4">gpt-5.4 medium</text>

  <rect x="1034" y="488" width="164" height="48" rx="14" fill="#FFFFFF" stroke="#7D92F0" stroke-width="2"/>
