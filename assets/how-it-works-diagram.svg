  <rect x="0" y="0" width="1400" height="820" rx="28" fill="url(#bg)"/>
  <text x="700" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1E2B3A">
    eng-ai-committee review pipeline
  </text>
  <text x="700" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5F6F82">
    Multimodal document intake, parallel specialist review, adversarial debate, and deterministic verdict rules
  </text>

  <rect x="48" y="150" width="256" height="480" rx="26" fill="#FFFDF8" stroke="#F0B659" stroke-width="3" filter="url(#shadow)"/>
  <text x="176" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#3B2B16">Inputs</text>

  <rect x="72" y="220" width="208" height="82" rx="18" fill="#FFF2D8" stroke="#F0B659" stroke-width="2"/>
  <text x="176" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#3B2B16">PDF</text>
  <text x="176" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Extracted text + page PNGs</text>

  <rect x="72" y="322" width="208" height="82" rx="18" fill="#FFF2D8" stroke="#F0B659" stroke-width="2"/>
  <text x="176" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#3B2B16">DOCX</text>
  <text x="176" y="381" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Parsed text + embedded images</text>

  <rect x="72" y="424" width="208" height="82" rx="18" fill="#FFF2D8" stroke="#F0B659" stroke-width="2"/>
  <text x="176" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#3B2B16">Markdown / TXT</text>
  <text x="176" y="483" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Plain text review input</text>

  <rect x="72" y="526" width="208" height="82" rx="18" fill="#FFF2D8" stroke="#F0B659" stroke-width="2"/>
  <text x="176" y="558" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#3B2B16">Evidence rule</text>
  <text x="176" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5C4A2A">Every finding needs a document excerpt</text>

