  <path d="M572 278H606C614 278 620 284 620 292V292" stroke="#56637A" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M980 404H1002" stroke="#56637A" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1204 280H1234C1242 280 1252 288 1252 304" stroke="#56637A" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M1230 524C1260 524 1270 498 1270 472" stroke="#129B59" stroke-width="3" fill="none" marker-end="url(#greenArrow)"/>
  <path d="M1308 460V528" stroke="#56637A" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M1116 536V548" stroke="#7D92F0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1116 596V608" stroke="#7D92F0" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="368" y="400" width="188" height="94" rx="22" fill="#FFFFFF" stroke="#DD564C" stroke-width="3" stroke-dasharray="8 10"/>
  <text x="462" y="436" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#8A2F2A">Fast fail path</text>
  <text x="462" y="467" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#8A2F2A">Missing required</text>
  <text x="462" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#8A2F2A">sections -> Reject</text>

  <path d="M462 352V392" stroke="#DD564C" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="996" y="126" width="240" height="54" rx="18" fill="#FFFFFF" stroke="#2CA98A" stroke-width="2"/>
  <text x="1116" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#275B54">
    Near-duplicates merged before debate
  </text>

  <rect x="1010" y="678" width="172" height="82" rx="20" fill="#FFFFFF" stroke="#5F79E8" stroke-width="2"/>
  <text x="1096" y="711" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#243475">Confidence bands</text>
  <text x="1096" y="736" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4052A4">85-100 clear</text>
  <text x="1096" y="754" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4052A4">25-44 uncertain</text>
</svg>
