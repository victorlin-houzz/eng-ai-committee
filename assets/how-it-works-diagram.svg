<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7E6"/>
      <stop offset="1" stop-color="#F7FAFF"/>
    </linearGradient>
    <linearGradient id="orangePanel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFE1B8"/>
      <stop offset="1" stop-color="#FFB84D"/>
    </linearGradient>
    <linearGradient id="tealPanel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#E5FFF7"/>
      <stop offset="1" stop-color="#8DE1CB"/>
    </linearGradient>
    <linearGradient id="violetPanel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#EEF0FF"/>
      <stop offset="1" stop-color="#B7C4FF"/>
    </linearGradient>
    <linearGradient id="greenVerdict" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D6FFE4"/>
      <stop offset="1" stop-color="#64D68B"/>
    </linearGradient>
    <linearGradient id="amberVerdict" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF2C9"/>
      <stop offset="1" stop-color="#F5B14A"/>
    </linearGradient>
    <linearGradient id="redVerdict" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFD7D4"/>
      <stop offset="1" stop-color="#FF7466"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#243B5320"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2L11 7L2 12" stroke="#56637A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="greenArrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2L11 7L2 12" stroke="#129B59" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
