<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- Judge's wig (white powdered) -->
  <rect x="9" y="4" width="14" height="9" fill="#f0f0e8"/>
  <rect x="8" y="7" width="2" height="8" fill="#f0f0e8"/>
  <rect x="22" y="7" width="2" height="8" fill="#f0f0e8"/>
  <rect x="9" y="13" width="4" height="3" fill="#f0f0e8"/>
  <rect x="19" y="13" width="4" height="3" fill="#f0f0e8"/>
  <!-- Head -->
  <rect x="11" y="10" width="10" height="9" fill="#d4956a"/>
  <!-- Eyes (stern frown) -->
  <rect x="12" y="13" width="3" height="2" fill="#1a1a1a"/>
  <rect x="17" y="13" width="3" height="2" fill="#1a1a1a"/>
  <!-- Eyebrows (angled down, stern) -->
  <rect x="12" y="11" width="4" height="1" fill="#3a2010"/>
  <rect x="12" y="12" width="1" height="1" fill="#3a2010"/>
  <rect x="17" y="11" width="4" height="1" fill="#3a2010"/>
  <rect x="20" y="12" width="1" height="1" fill="#3a2010"/>
  <!-- Serious mouth -->
  <rect x="13" y="17" width="6" height="1" fill="#9a6050"/>
  <!-- Red robe -->
  <rect x="8" y="19" width="16" height="16" fill="#c0392b"/>
  <!-- Gold trim -->
  <rect x="8" y="19" width="16" height="2" fill="#ffd700"/>
  <rect x="8" y="19" width="2" height="16" fill="#ffd700"/>
  <rect x="22" y="19" width="2" height="16" fill="#ffd700"/>
  <!-- Gavel (right hand) -->
  <rect x="22" y="25" width="7" height="3" fill="#8b4513"/>
  <rect x="25" y="22" width="3" height="4" fill="#5c2d0a"/>
  <!-- White collar/shirt -->
  <rect x="13" y="19" width="6" height="5" fill="#ffffff"/>
  <rect x="14" y="22" width="4" height="2" fill="#e0e0e0"/>
  <!-- Arms -->
  <rect x="5" y="19" width="3" height="12" fill="#c0392b"/>
  <rect x="24" y="19" width="3" height="12" fill="#c0392b"/>
  <!-- Hands -->
  <rect x="5" y="31" width="3" height="3" fill="#d4956a"/>
  <rect x="24" y="31" width="3" height="3" fill="#d4956a"/>
  <!-- Dark robe bottom -->
  <rect x="10" y="35" width="12" height="9" fill="#8b0000"/>
  <!-- Legs/robe hem -->
  <rect x="10" y="43" width="12" height="3" fill="#ffd700"/>
  <!-- Shoes -->
  <rect x="10" y="44" width="5" height="4" fill="#1a1a1a"/>
  <rect x="17" y="44" width="5" height="4" fill="#1a1a1a"/>
  <!-- Scales of justice on chest -->
  <rect x="14" y="24" width="4" height="1" fill="#ffd700"/>
  <rect x="15" y="25" width="2" height="3" fill="#ffd700"/>
  <rect x="13" y="28" width="2" height="1" fill="#ffd700"/>
  <rect x="17" y="28" width="2" height="1" fill="#ffd700"/>
</svg>
