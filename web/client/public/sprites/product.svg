<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- Hair (bun) -->
  <rect x="12" y="6" width="8" height="4" fill="#5c3a1e"/>
  <rect x="14" y="4" width="4" height="4" fill="#5c3a1e"/>
  <!-- Head -->
  <rect x="11" y="10" width="10" height="10" fill="#f0c8a0"/>
  <!-- Eyes (with glasses) -->
  <rect x="12" y="13" width="3" height="2" fill="none" stroke="#2c6040" stroke-width="1"/>
  <rect x="17" y="13" width="3" height="2" fill="none" stroke="#2c6040" stroke-width="1"/>
  <rect x="14" y="14" width="1" height="1" fill="#2c1810"/>
  <rect x="18" y="14" width="1" height="1" fill="#2c1810"/>
  <rect x="15" y="14" width="2" height="1" fill="#2c6040"/>
  <!-- Smile -->
  <rect x="13" y="18" width="6" height="1" fill="#c07878"/>
  <rect x="13" y="17" width="1" height="1" fill="#c07878"/>
  <rect x="18" y="17" width="1" height="1" fill="#c07878"/>
  <!-- Body (green jacket) -->
  <rect x="10" y="20" width="12" height="14" fill="#2e7d32"/>
  <!-- Clipboard -->
  <rect x="6" y="20" width="4" height="7" fill="#f5e6c8"/>
  <rect x="6" y="20" width="4" height="1" fill="#8b6914"/>
  <rect x="7" y="22" width="2" height="1" fill="#808080"/>
  <rect x="7" y="24" width="2" height="1" fill="#808080"/>
  <rect x="7" y="26" width="2" height="1" fill="#4caf50"/>
  <!-- Arms -->
  <rect x="7" y="20" width="3" height="10" fill="#2e7d32"/>
  <rect x="22" y="20" width="3" height="10" fill="#2e7d32"/>
  <!-- Hands -->
  <rect x="7" y="30" width="3" height="3" fill="#f0c8a0"/>
  <rect x="22" y="30" width="3" height="3" fill="#f0c8a0"/>
  <!-- Legs -->
  <rect x="10" y="34" width="5" height="10" fill="#1b5e20"/>
  <rect x="17" y="34" width="5" height="10" fill="#1b5e20"/>
  <!-- Shoes -->
  <rect x="10" y="43" width="6" height="4" fill="#f0a000"/>
  <rect x="16" y="43" width="6" height="4" fill="#f0a000"/>
  <!-- Orange accent stripe -->
  <rect x="10" y="24" width="12" height="2" fill="#ff6f00"/>
  <!-- ID badge -->
  <rect x="19" y="23" width="3" height="4" fill="#ffffff"/>
  <rect x="20" y="24" width="2" height="1" fill="#1a3a6b"/>
  <rect x="19" y="25" width="3" height="1" fill="#808080"/>
</svg>
