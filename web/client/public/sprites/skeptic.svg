<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- Head -->
  <rect x="11" y="9" width="10" height="10" fill="#e0c090"/>
  <!-- Spiky hair (purple-ish) -->
  <rect x="11" y="6" width="10" height="4" fill="#6a0dad"/>
  <rect x="10" y="7" width="2" height="4" fill="#6a0dad"/>
  <rect x="20" y="7" width="2" height="4" fill="#6a0dad"/>
  <rect x="13" y="5" width="2" height="3" fill="#6a0dad"/>
  <rect x="17" y="5" width="2" height="3" fill="#6a0dad"/>
  <!-- Raised eyebrow (skeptical look) -->
  <rect x="12" y="11" width="4" height="1" fill="#4a3010"/>
  <rect x="11" y="10" width="2" height="1" fill="#4a3010"/>
  <rect x="17" y="12" width="3" height="1" fill="#4a3010"/>
  <!-- Eyes -->
  <rect x="12" y="13" width="3" height="2" fill="#2c1810"/>
  <rect x="17" y="13" width="3" height="2" fill="#2c1810"/>
  <!-- Smirk -->
  <rect x="16" y="17" width="4" height="1" fill="#b07050"/>
  <rect x="15" y="18" width="2" height="1" fill="#b07050"/>
  <!-- Body (grey trench coat) -->
  <rect x="9" y="19" width="14" height="15" fill="#607080"/>
  <!-- Coat collar -->
  <rect x="11" y="19" width="3" height="5" fill="#506070"/>
  <rect x="18" y="19" width="3" height="5" fill="#506070"/>
  <!-- Magnifying glass (right hand) -->
  <rect x="22" y="22" width="5" height="5" fill="none" stroke="#c0c0c0" stroke-width="1.5"/>
  <rect x="23" y="23" width="3" height="3" fill="#a0d0f0" opacity="0.5"/>
  <rect x="26" y="27" width="2" height="5" fill="#808080" transform="rotate(45 27 27)"/>
  <!-- Arms -->
  <rect x="6" y="19" width="3" height="10" fill="#607080"/>
  <rect x="23" y="19" width="3" height="10" fill="#607080"/>
  <!-- Hands -->
  <rect x="6" y="29" width="3" height="3" fill="#e0c090"/>
  <rect x="23" y="29" width="3" height="3" fill="#e0c090"/>
  <!-- Legs -->
  <rect x="10" y="34" width="5" height="10" fill="#404858"/>
  <rect x="17" y="34" width="5" height="10" fill="#404858"/>
  <!-- Shoes -->
  <rect x="10" y="44" width="5" height="4" fill="#202030"/>
  <rect x="17" y="44" width="5" height="4" fill="#202030"/>
  <!-- Question mark on chest -->
  <rect x="14" y="25" width="4" height="5" fill="#9c27b0" opacity="0.8"/>
  <rect x="15" y="26" width="2" height="1" fill="#ffffff"/>
  <rect x="16" y="27" width="1" height="1" fill="#ffffff"/>
  <rect x="15" y="29" width="1" height="1" fill="#ffffff"/>
</svg>
