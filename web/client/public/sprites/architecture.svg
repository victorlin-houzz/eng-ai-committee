<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- Pom-pom (yellow) -->
  <rect x="13" y="0" width="6" height="4" fill="#f5c518"/>
  <!-- Hat body (light blue) -->
  <rect x="8" y="3" width="16" height="8" fill="#7ab8e8"/>
  <!-- Hat red stripe at brim -->
  <rect x="7" y="10" width="18" height="3" fill="#cc2200"/>
  <!-- Face (round, chubby, pale) -->
  <rect x="8" y="12" width="16" height="11" fill="#f5e0c8"/>
  <!-- Rosy cheeks -->
  <rect x="8" y="17" width="4" height="3" fill="#e88880"/>
  <rect x="20" y="17" width="4" height="3" fill="#e88880"/>
  <!-- Eyes (beady black) -->
  <rect x="13" y="15" width="2" height="2" fill="#1a1a1a"/>
  <rect x="17" y="15" width="2" height="2" fill="#1a1a1a"/>
  <!-- Mouth -->
  <rect x="13" y="20" width="6" height="2" fill="#b06060"/>
  <!-- Chin (chubby) -->
  <rect x="9" y="22" width="14" height="2" fill="#efd4b8"/>
  <!-- White undershirt / collar -->
  <rect x="13" y="23" width="6" height="4" fill="#f0f0f0"/>
  <!-- Body (red jacket, wide) -->
  <rect x="8" y="23" width="16" height="13" fill="#cc2200"/>
  <rect x="13" y="23" width="6" height="4" fill="#f0f0f0"/>
  <!-- Arms -->
  <rect x="5" y="23" width="3" height="11" fill="#cc2200"/>
  <rect x="24" y="23" width="3" height="11" fill="#cc2200"/>
  <!-- Hands (skin) -->
  <rect x="5" y="34" width="3" height="3" fill="#f5e0c8"/>
  <rect x="24" y="34" width="3" height="3" fill="#f5e0c8"/>
  <!-- Pants (blue) -->
  <rect x="9" y="36" width="6" height="9" fill="#3858b0"/>
  <rect x="17" y="36" width="6" height="9" fill="#3858b0"/>
  <!-- Shoes (black) -->
  <rect x="8" y="44" width="7" height="4" fill="#1a1a1a"/>
  <rect x="17" y="44" width="7" height="4" fill="#1a1a1a"/>
</svg>
